name: Deploy Backend

on:
  push:
    branches: [ main ] # Sesuaikan dengan branch utama Anda (main/master)

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build backend
        run: npm run build

      - name: Copy built files to Debian Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "dist/,package.json,package-lock.json,prisma/"
          target: "/var/www/catatduit/be"
          rm: false

      - name: Install production dependencies, migrate, and restart backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd /var/www/catatduit/be
            npm ci --omit=dev
            npx prisma migrate deploy
            pm2 restart catatduit-backend || pm2 start dist/src/main.js --name "catatduit-backend"
